<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Wallet</title>
</head>
<body class="notranslate" style="font-family: Arial, sans-serif; background-color: #72a3da; color: #fff; margin: 0; padding: 20px; text-align: center;">

    <div style="max-width: 600px; margin: 0 auto; padding-top: 30px;">
        
        <!-- Ваш оригинальный заголовок -->
        <h2 style="font-weight: bold; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;">PROJECT WALLET</h2>
        
        <p style="font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
            Support the Sci-Fi Philosophical Project with any amount of donation
(USDC / ETH).
        </p>

        <!-- Ваш оригинальный блок с адресом BASE -->
        <div style="border: 2px solid #000; background-color: #72a3da; padding: 25px; margin-bottom: 30px; border-radius: 4px;">
            <div style="font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: #000;">
                OUR BASE NETWORK ADDRESS:
            </div>
            
            <div style="background-color: #a4c4e8; border: 1px solid #000; padding: 12px; font-family: monospace; font-size: 14px; word-break: break-all; font-weight: bold; color: #000; margin-bottom: 15px; border-radius: 2px;">
                0x27B392b21634Dc226046A9eA64e69BCD35bE608c
            </div>
            
            <div style="font-size: 13px; font-weight: bold; color: #000;">
                ⚠ Send via BASE network only!
            </div>
        </div>

        <p style="font-size: 15px; margin-bottom: 25px; color: #fff; font-weight: bold; text-transform: uppercase;">
            Fast Transfer via MetaMask:
        </p>

        <!-- ================= ВАШ СОБСТВЕННЫЙ ШЛЮЗ METAMASK ================= -->
        <div style="margin-bottom: 40px; display: flex; flex-direction: column; align-items: center;">
            
            <!-- Прямая Web3-ссылка: при клике открывает MetaMask американца и подставляет ваш адрес кошелька -->
            <a href="https://app.link" target="_blank" style="display: block; width: 100%; max-width: 440px; border: 2px solid #000; background: #fff; border-radius: 0px; overflow: hidden; line-height: 0; box-shadow: 5px 5px 0px #000; text-decoration: none;">
                
                <!-- Официальный логотип MetaMask -->
                <div style="padding: 25px 20px 15px 20px; background: #fff;">
                    <img src="https://ctfassets.net" alt="MetaMask" style="width: 100%; max-width: 150px; height: auto; margin: 0 auto; display: block;">
                </div>
                
                <!-- Строгая кнопка-шлюз -->
                <div style="background: #E17D36; color: #fff; font-weight: bold; font-size: 13px; padding: 12px; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; border-top: 2px solid #000;">
                    Open in MetaMask & Pay ➔
                </div>
            </a>

        </div>
        <!-- ============================================================== -->

        <!-- Кнопка назад -->
        <div style="margin-top: 30px;">
            <a href="index.html" style="color: #000; text-decoration: none; font-weight: bold; font-size: 16px;">➔ Back to Main / На главную</a>
        </div>

    </div>

</body>
</html>
